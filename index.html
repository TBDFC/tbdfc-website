<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TBD FC Internationals</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,300;0,400;0,600;0,700;1,300&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #D4AF37;
      --gold-light: #F0D060;
      --gold-dim: rgba(212,175,55,0.3);
      --black: #060608;
      --surface: #0e0e12;
      --surface2: #16161c;
      --border: rgba(212,175,55,0.15);
      --text: #f0ede8;
      --text-dim: rgba(240,237,232,0.5);
      --active-country: #D4AF37;
      --heritage-country: #8a8a9a;
      --inactive-country: #1a1a22;
    }

    html, body {
      height: 100%;
      background: var(--black);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      overflow: hidden;
      touch-action: none;
    }

    /* ── Header ── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      height: 56px;
      background: linear-gradient(180deg, rgba(6,6,8,0.98) 0%, rgba(6,6,8,0) 100%);
      border-bottom: 1px solid var(--border);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo img {
      height: 36px;
      width: 36px;
      object-fit: contain;
    }

    .logo-text { display: flex; flex-direction: column; line-height: 1; }

    .logo-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 0.08em;
      color: var(--gold);
    }

    .logo-sub {
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-top: 1px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .header-stat { text-align: right; }

    .header-stat-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      color: var(--gold);
      line-height: 1;
    }

    .header-stat-label {
      font-size: 8px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .header-divider {
      width: 1px;
      height: 24px;
      background: var(--border);
    }

    /* ── Map ── */
    #map-wrap {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #map-wrap.panel-open {
      transform: translateY(-30vh);
    }

    svg#world-map {
      width: 100%;
      height: 100%;
      cursor: grab;
    }

    svg#world-map:active { cursor: grabbing; }

    .country {
      stroke: rgba(212,175,55,0.12);
      stroke-width: 0.5;
      transition: fill 0.2s, filter 0.2s;
    }

    .country.inactive { fill: var(--inactive-country); }

    .country.heritage {
      fill: var(--heritage-country);
      cursor: pointer;
      filter: drop-shadow(0 0 4px rgba(138,138,154,0.4));
    }
    .country.heritage:hover, .country.heritage:active {
      fill: #b0b0c4;
      filter: drop-shadow(0 0 10px rgba(176,176,196,0.7));
    }

    .country.active {
      fill: var(--active-country);
      cursor: pointer;
      filter: drop-shadow(0 0 6px rgba(212,175,55,0.5));
      animation: pulse 3s ease-in-out infinite;
    }

    .country.active:hover, .country.active:active {
      fill: var(--gold-light);
      filter: drop-shadow(0 0 14px rgba(240,208,96,0.8));
    }

    @keyframes pulse {
      0%, 100% { filter: drop-shadow(0 0 6px rgba(212,175,55,0.4)); }
      50% { filter: drop-shadow(0 0 12px rgba(212,175,55,0.7)); }
    }

    /* ── Tap hint ── */
    #tap-hint {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(14,14,18,0.85);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 8px 18px;
      font-size: 12px;
      color: var(--text-dim);
      pointer-events: none;
      z-index: 150;
      backdrop-filter: blur(8px);
      white-space: nowrap;
      transition: opacity 0.4s;
    }

    #tap-hint.hidden { opacity: 0; }

    /* ── Tooltip (desktop only) ── */
    #tooltip {
      position: fixed;
      background: rgba(14,14,18,0.95);
      border: 1px solid var(--gold-dim);
      border-radius: 8px;
      padding: 10px 14px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 200;
      backdrop-filter: blur(8px);
    }

    #tooltip.visible { opacity: 1; }
    .tooltip-country { font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: var(--gold); letter-spacing: 0.06em; }
    .tooltip-stats { font-size: 12px; color: var(--text-dim); margin-top: 3px; }
    .tooltip-stats span { color: var(--text); font-weight: 600; }

    /* ── Side Panel — bottom sheet on mobile ── */
    #side-panel {
      position: fixed;
      left: 0; right: 0;
      bottom: 0;
      height: 70vh;
      background: var(--surface);
      border-top: 1px solid var(--border);
      border-radius: 20px 20px 0 0;
      transform: translateY(100%);
      transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 300;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #side-panel.open { transform: translateY(0); }

    /* Pull handle */
    #side-panel::before {
      content: '';
      display: block;
      width: 40px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 12px auto 0;
      flex-shrink: 0;
    }

    .panel-header {
      padding: 16px 20px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .panel-header-left { flex: 1; }

    .panel-close {
      width: 32px;
      height: 32px;
      background: rgba(212,175,55,0.1);
      border: 1px solid var(--border);
      border-radius: 50%;
      color: var(--gold);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .panel-flag { font-size: 32px; line-height: 1; margin-bottom: 4px; }

    .panel-country-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 0.06em;
      color: var(--gold);
      line-height: 1;
    }

    .panel-counts { display: flex; gap: 16px; margin-top: 8px; align-items: center; }
    .panel-count { display: flex; flex-direction: column; }
    .panel-count-num { font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: var(--text); line-height: 1; }
    .panel-count-label { font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-dim); }
    .panel-divider { width: 1px; height: 28px; background: var(--border); }

    /* ── Player cards ── */
    .panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px 24px;
      -webkit-overflow-scrolling: touch;
    }

    .panel-section-title {
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 12px;
    }

    .player-card {
      display: flex;
      gap: 12px;
      align-items: center;
      padding: 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 10px;
      transition: border-color 0.2s;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
    }

    .player-card:active { border-color: var(--gold-dim); }

    .player-avatar {
      width: 52px; height: 52px;
      border-radius: 50%;
      overflow: hidden;
      flex-shrink: 0;
      background: var(--gold-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
    }

    .player-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .player-initial { font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: var(--gold); }
    .player-info { flex: 1; min-width: 0; }
    .player-name { font-weight: 700; font-size: 14px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .player-position { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
    .player-bio { font-size: 11px; color: var(--text-dim); font-style: italic; margin-top: 4px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .player-highlight { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; color: var(--gold); margin-top: 6px; text-decoration: none; }

    /* ── Subscribers row ── */
    .subscribers-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-top: 6px;
    }

    .sub-icon { width: 36px; height: 36px; border-radius: 50%; background: rgba(212,175,55,0.08); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
    .sub-count { font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: var(--gold); line-height: 1; }
    .sub-label { font-size: 11px; color: var(--text-dim); margin-top: 1px; }

    /* ── Loading ── */
    #loading {
      position: fixed;
      inset: 0;
      background: var(--black);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 500;
      transition: opacity 0.6s;
    }

    #loading.hidden { opacity: 0; pointer-events: none; }

    .loading-crest { width: 80px; height: 80px; object-fit: contain; animation: spin-slow 4s linear infinite; margin-bottom: 20px; }

    @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    .loading-text { font-family: 'Bebas Neue', sans-serif; font-size: 14px; letter-spacing: 0.3em; color: var(--gold-dim); }

    /* ── Grain ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 400;
      opacity: 0.4;
    }

    /* ── Desktop overrides ── */
    @media (min-width: 768px) {
      header { height: 72px; padding: 0 40px; }
      .logo img { height: 48px; width: 48px; }
      .logo-name { font-size: 28px; }
      .logo-sub { font-size: 10px; }
      .header-right { gap: 32px; }
      .header-stat-num { font-size: 26px; }
      .header-stat-label { font-size: 10px; }

      #map-wrap.panel-open { transform: translateX(-200px); }

      #side-panel {
        top: 0; bottom: auto;
        left: auto; right: 0;
        width: 420px;
        height: 100%;
        border-top: none;
        border-left: 1px solid var(--border);
        border-radius: 0;
        transform: translateX(100%);
      }

      #side-panel::before { display: none; }
      #side-panel.open { transform: translateX(0); }

      .panel-header { padding: 28px 28px 20px; display: block; }
      .panel-body { padding: 20px 28px 28px; }
      .panel-flag { font-size: 42px; margin-bottom: 8px; }
      .panel-country-name { font-size: 36px; }
      .panel-close { position: absolute; top: 20px; right: 20px; width: 36px; height: 36px; font-size: 18px; }
      .player-avatar { width: 56px; height: 56px; }
      .loading-crest { width: 100px; height: 100px; }
    }
  </style>
</head>
<body>

<!-- Loading screen -->
<div id="loading">

<script>

}

const ISO_TO_NAME = Object.fromEntries(Object.entries(NAME_TO_ISO).map(([k,v]) => [v,k]))

function getFlag(code) {
  if (!code || code.length !== 2) return ''
  return code.toUpperCase().replace(/./g, c => String.fromCodePoint(c.charCodeAt(0) + 127397))
}

// ── Load data ──
async function loadData() {
  const { data: players } = await db
    .from('profiles')
    .select('id, full_name, position, nationality, nationality_code, nationality_code2, avatar_url, bio, highlight_url, is_public')
    .eq('is_active', true)
    .eq('role', 'player')
    .eq('is_public', true)

  if (players) {
    for (const p of players) {
      const code = p.nationality_code?.toUpperCase()
      if (!code) continue
      if (!playersByCountry[code]) playersByCountry[code] = []
      playersByCountry[code].push(p)
      activeCountries.add(code)
    }
    // Second nationality — heritage
    for (const p of players) {
      const code2 = p.nationality_code2?.toUpperCase()
      if (!code2) continue
      if (!heritageByCountry[code2]) heritageByCountry[code2] = []
      heritageByCountry[code2].push(p)
      if (!activeCountries.has(code2)) heritageCountries.add(code2)
    }
    document.getElementById('stat-players').textContent = players.length
    document.getElementById('stat-nations').textContent = activeCountries.size
  }

  // Subscribers placeholder — all 0 for now
  document.getElementById('stat-subscribers').textContent = 0
}

// ── Build map ──

  const resp = await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')

  const { feature } = await import('https://cdn.jsdelivr.net/npm/topojson-client@3/+esm')
  geoData = feature(world, world.objects.countries)

  const svg = d3.select('#world-map')
  const w = window.innerWidth
  const h = window.innerHeight

  svg.attr('viewBox', `0 0 ${w} ${h}`)

  const projection = d3.geoNaturalEarth1()
    .scale(w / 6.2)
    .translate([w / 2, h / 2])

  const path = d3.geoPath().projection(projection)

  // Hardcoded numeric ISO → alpha2 mapping for D3 world atlas
  const numToAlpha2 = {

    '372':'IE','376':'IL','380':'IT','388':'JM','392':'JP','400':'JO','398':'KZ',

    '430':'LR','434':'LY','440':'LT','484':'MX','504':'MA','508':'MZ','516':'NA',
    '524':'NP','528':'NL','540':'NC','554':'NZ','558':'NI','562':'NE','566':'NG',
    '578':'NO','586':'PK','591':'PA','600':'PY','604':'PE','608':'PH','616':'PL',
    '620':'PT','630':'PR','634':'QA','642':'RO','643':'RU','646':'RW','682':'SA',
    '686':'SN','694':'SL','703':'SK','705':'SI','706':'SO','710':'ZA','724':'ES',
    '729':'SD','752':'SE','756':'CH','760':'SY','762':'TJ','764':'TH','768':'TG',
    '780':'TT','788':'TN','792':'TR','800':'UG','804':'UA','784':'AE','826':'GB',
    '840':'US','858':'UY','860':'UZ','862':'VE','704':'VN','887':'YE','894':'ZM',
    '716':'ZW','051':'AM','031':'AZ','112':'BY','070':'BA','064':'BT','854':'BF',
    '108':'BI','132':'CV','148':'TD','174':'KM','262':'DJ','226':'GQ','232':'ER',
    '242':'FJ','270':'GM','268':'GE','320':'GT','624':'GW','328':'GY','417':'KG',
    '426':'LS','442':'LU','450':'MG','454':'MW','462':'MV','466':'ML','478':'MR',
    '480':'MU','498':'MD','496':'MN','499':'ME','524':'NP','807':'MK','512':'OM',
    '275':'PS','598':'PG','688':'RS','090':'SB','706':'SO','728':'SS','740':'SR',
    '795':'TM','626':'TL','800':'UG','860':'UZ',
  }

  // ── Touch pan & zoom ──
  const zoom = d3.zoom()
    .scaleExtent([1, 8])
    .on('zoom', (event) => {
      svg.selectAll('.country').attr('transform', event.transform)
    })

  svg.call(zoom)

  // Hide tap hint on first interaction
  const hint = document.getElementById('tap-hint')
  svg.on('click.hint', () => { hint.classList.add('hidden') })

  const tooltip = document.getElementById('tooltip')
  const mapWrap = document.getElementById('map-wrap')

  svg.selectAll('.country')
    .data(geoData.features)
    .join('path')
    .attr('class', d => {
      const alpha2 = numToAlpha2[String(d.id).padStart(3, '0')] || ''
      if (activeCountries.has(alpha2)) return 'country active'
      if (heritageCountries.has(alpha2)) return 'country heritage'
      return 'country inactive'
    })
    .attr('d', path)
    .on('mousemove', function(event, d) {
      const alpha2 = numToAlpha2[String(d.id).padStart(3, '0')] || ''
      const isActive = activeCountries.has(alpha2)
      const isHeritage = heritageCountries.has(alpha2)
      if (!isActive && !isHeritage) return

      const players = playersByCountry[alpha2] || []
      const heritage = heritageByCountry[alpha2] || []
      const subs = subscribersByCountry[alpha2] || 0
      const countryName = players[0]?.nationality || heritage[0]?.nationality || alpha2
      const totalPlayers = players.length + (isHeritage ? heritage.length : 0)

      document.getElementById('tt-country').textContent = countryName
      document.getElementById('tt-stats').innerHTML =
        `<span>${totalPlayers}</span> player${totalPlayers !== 1 ? 's' : ''} · <span>${subs}</span> followers`

      tooltip.classList.add('visible')
      tooltip.style.left = (event.clientX + 14) + 'px'
      tooltip.style.top = (event.clientY - 40) + 'px'
    })
    .on('mouseleave', function(event, d) {
      const alpha2 = numToAlpha2[String(d.id).padStart(3, '0')] || ''
      if (!activeCountries.has(alpha2) && !heritageCountries.has(alpha2)) return
      tooltip.classList.remove('visible')
    })
    .on('click', function(event, d) {
      const alpha2 = numToAlpha2[String(d.id).padStart(3, '0')] || ''
      if (!activeCountries.has(alpha2) && !heritageCountries.has(alpha2)) return
      tooltip.classList.remove('visible')
      openPanel(alpha2)
    })

  // Resize
  window.addEventListener('resize', () => {
    const nw = window.innerWidth
    const nh = window.innerHeight
    svg.attr('viewBox', `0 0 ${nw} ${nh}`)
    projection.scale(nw / 6.2).translate([nw / 2, nh / 2])
    svg.selectAll('.country').attr('d', path)
  })
}

// ── Side panel ──
function openPanel(countryCode) {
  const players = playersByCountry[countryCode] || []
  const heritage = heritageByCountry[countryCode] || []
  const subs = subscribersByCountry[countryCode] || 0
  const countryName = players[0]?.nationality || heritage[0]?.nationality || countryCode
  const flag = getFlag(countryCode)

  document.getElementById('panel-flag').textContent = flag
  document.getElementById('panel-country').textContent = countryName
  document.getElementById('panel-player-count').textContent = players.length + heritage.length
  document.getElementById('panel-sub-count').textContent = subs

  const body = document.getElementById('panel-body')
  body.innerHTML = ''

  function renderPlayers(list, isHeritage) {
    for (const p of list) {
      const card = document.createElement('div')
      card.className = 'player-card'
      card.style.borderColor = isHeritage ? 'rgba(176,176,196,0.5)' : 'rgba(212,175,55,0.3)'

      const avatar = document.createElement('div')
      avatar.className = 'player-avatar'
      avatar.style.borderColor = isHeritage ? '#b0b0c4' : '#D4AF37'
      if (p.avatar_url) {
        const img = document.createElement('img')
        img.src = p.avatar_url
        img.alt = p.full_name
        avatar.appendChild(img)
      } else {
        const init = document.createElement('div')
        init.className = 'player-initial'
        init.style.color = isHeritage ? '#b0b0c4' : 'var(--gold)'
        init.textContent = p.full_name.charAt(0)
        avatar.appendChild(init)
      }

      const info = document.createElement('div')
      info.className = 'player-info'

      const name = document.createElement('div')
      name.className = 'player-name'
      name.textContent = p.full_name

      const pos = document.createElement('div')
      pos.className = 'player-position'
      pos.textContent = `${flag} ${p.position || 'Player'}`
      if (isHeritage) {
        pos.style.color = '#b0b0c4'
        pos.title = 'Heritage nationality'
      }

      info.appendChild(name)
      info.appendChild(pos)

      if (p.bio) {
        const bio = document.createElement('div')
        bio.className = 'player-bio'
        bio.textContent = `"${p.bio}"`
        info.appendChild(bio)
      }

      if (p.highlight_url) {
        const hl = document.createElement('a')
        hl.href = p.highlight_url
        hl.target = '_blank'
        hl.rel = 'noreferrer'
        hl.className = 'player-highlight'
        hl.innerHTML = '🎬 Highlights'
        info.appendChild(hl)
      }

      card.appendChild(avatar)
      card.appendChild(info)
      body.appendChild(card)
    }
  }

  if (players.length > 0) {
    const title = document.createElement('div')
    title.className = 'panel-section-title'
    title.textContent = 'Players'
    body.appendChild(title)
    renderPlayers(players, false)
  }

  if (heritage.length > 0) {
    const title = document.createElement('div')
    title.className = 'panel-section-title'
    title.style.color = '#b0b0c4'
    title.textContent = 'Heritage'
    body.appendChild(title)
    renderPlayers(heritage, true)
  }

  // Subscribers section
  const subTitle = document.createElement('div')
  subTitle.className = 'panel-section-title'
  subTitle.style.marginTop = players.length ? '20px' : '0'
  subTitle.textContent = 'Community'
  body.appendChild(subTitle)

  const subRow = document.createElement('div')
  subRow.className = 'subscribers-row'
  subRow.innerHTML = `
    <div class="sub-icon">🌍</div>
    <div class="sub-text">
      <div class="sub-count">${subs}</div>
      <div class="sub-label">Newsletter followers from ${countryName}</div>
    </div>
  `
  body.appendChild(subRow)

  document.getElementById('side-panel').classList.add('open')
  document.getElementById('map-wrap').classList.add('panel-open')
}

function closePanel() {
  document.getElementById('side-panel').classList.remove('open')
  document.getElementById('map-wrap').classList.remove('panel-open')
}

document.getElementById('panel-close').addEventListener('click', closePanel)

// ── Init ──
async function init() {
  await loadData()
  await buildMap()
  document.getElementById('loading').classList.add('hidden')
}

init()
</script>
