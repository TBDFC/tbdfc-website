<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TBD FC Internationals</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,300;0,400;0,600;0,700;1,300&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #D4AF37;
      --gold-light: #F0D060;
      --gold-dim: rgba(212,175,55,0.3);
      --black: #060608;
      --surface: #0e0e12;
      --surface2: #16161c;
      --border: rgba(212,175,55,0.15);
      --text: #f0ede8;
      --text-dim: rgba(240,237,232,0.5);
      --active-country: #D4AF37;
      --inactive-country: #1a1a22;
      --hover-country: #2a2a38;
    }

    html, body {
      height: 100%;
      background: var(--black);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      height: 72px;
      background: linear-gradient(180deg, rgba(6,6,8,0.98) 0%, rgba(6,6,8,0) 100%);
      border-bottom: 1px solid var(--border);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo img {
      height: 48px;
      width: 48px;
      object-fit: contain;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1;
    }

    .logo-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 0.08em;
      color: var(--gold);
    }

    .logo-sub {
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-top: 2px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 32px;
    }

    .header-stat {
      text-align: right;
    }

    .header-stat-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 26px;
      color: var(--gold);
      line-height: 1;
    }

    .header-stat-label {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .header-divider {
      width: 1px;
      height: 32px;
      background: var(--border);
    }

    /* ── Map container ── */
    #map-wrap {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #map-wrap.panel-open {
      transform: translateX(-200px);
    }

    svg#world-map {
      width: 100%;
      height: 100%;
    }

    .country {
      stroke: rgba(212,175,55,0.12);
      stroke-width: 0.5;
      transition: fill 0.2s, filter 0.2s;
      cursor: default;
    }

    .country.inactive {
      fill: var(--inactive-country);
    }

    .country.active {
      fill: var(--active-country);
      cursor: pointer;
      filter: drop-shadow(0 0 6px rgba(212,175,55,0.5));
      animation: pulse 3s ease-in-out infinite;
    }

    .country.active:hover {
      fill: var(--gold-light);
      filter: drop-shadow(0 0 14px rgba(240,208,96,0.8));
    }

    @keyframes pulse {
      0%, 100% { filter: drop-shadow(0 0 6px rgba(212,175,55,0.4)); }
      50% { filter: drop-shadow(0 0 12px rgba(212,175,55,0.7)); }
    }

    /* ── Tooltip ── */
    #tooltip {
      position: fixed;
      background: rgba(14,14,18,0.95);
      border: 1px solid var(--gold-dim);
      border-radius: 8px;
      padding: 10px 14px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 200;
      backdrop-filter: blur(8px);
    }

    #tooltip.visible { opacity: 1; }

    .tooltip-country {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      color: var(--gold);
      letter-spacing: 0.06em;
    }

    .tooltip-stats {
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 3px;
    }

    .tooltip-stats span {
      color: var(--text);
      font-weight: 600;
    }

    /* ── Side Panel ── */
    #side-panel {
      position: fixed;
      top: 0;
      right: 0;
      width: 420px;
      height: 100%;
      background: var(--surface);
      border-left: 1px solid var(--border);
      transform: translateX(100%);
      transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 300;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #side-panel.open {
      transform: translateX(0);
    }

    .panel-header {
      padding: 28px 28px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .panel-close {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 36px;
      height: 36px;
      background: rgba(212,175,55,0.1);
      border: 1px solid var(--border);
      border-radius: 50%;
      color: var(--gold);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    .panel-close:hover { background: rgba(212,175,55,0.2); }

    .panel-flag {
      font-size: 42px;
      line-height: 1;
      margin-bottom: 8px;
    }

    .panel-country-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 36px;
      letter-spacing: 0.06em;
      color: var(--gold);
      line-height: 1;
    }

    .panel-counts {
      display: flex;
      gap: 20px;
      margin-top: 10px;
    }

    .panel-count {
      display: flex;
      flex-direction: column;
    }

    .panel-count-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 24px;
      color: var(--text);
      line-height: 1;
    }

    .panel-count-label {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .panel-divider {
      width: 1px;
      background: var(--border);
      align-self: stretch;
    }

    /* ── Player cards ── */
    .panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px 28px 28px;
      scrollbar-width: thin;
      scrollbar-color: var(--gold-dim) transparent;
    }

    .panel-section-title {
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 14px;
    }

    .player-card {
      display: flex;
      gap: 14px;
      align-items: center;
      padding: 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 10px;
      transition: border-color 0.2s, transform 0.2s;
      text-decoration: none;
    }

    .player-card:hover {
      border-color: var(--gold-dim);
      transform: translateX(4px);
    }

    .player-avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      overflow: hidden;
      flex-shrink: 0;
      background: var(--gold-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
    }

    .player-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .player-initial {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      color: var(--gold);
    }

    .player-info { flex: 1; min-width: 0; }

    .player-name {
      font-weight: 700;
      font-size: 15px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .player-position {
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 2px;
    }

    .player-bio {
      font-size: 11px;
      color: var(--text-dim);
      font-style: italic;
      margin-top: 4px;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .player-highlight {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: var(--gold);
      margin-top: 6px;
      text-decoration: none;
    }

    .player-highlight:hover { color: var(--gold-light); }

    /* ── Subscribers row ── */
    .subscribers-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-top: 6px;
    }

    .sub-icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(212,175,55,0.08);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .sub-text { flex: 1; }

    .sub-count {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      color: var(--gold);
      line-height: 1;
    }

    .sub-label {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 1px;
    }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-dim);
      font-size: 14px;
    }

    /* ── Loading ── */
    #loading {
      position: fixed;
      inset: 0;
      background: var(--black);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 500;
      transition: opacity 0.6s;
    }

    #loading.hidden { opacity: 0; pointer-events: none; }

    .loading-crest {
      width: 100px;
      height: 100px;
      object-fit: contain;
      animation: spin-slow 4s linear infinite;
      margin-bottom: 24px;
    }

    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .loading-text {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 16px;
      letter-spacing: 0.3em;
      color: var(--gold-dim);
    }

    /* ── Grain overlay ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 400;
      opacity: 0.4;
    }

    /* ── Gold scan line ── */
    .scanline {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      opacity: 0.15;
      animation: scan 8s linear infinite;
      pointer-events: none;
      z-index: 401;
    }

    @keyframes scan {
      from { top: -2px; }
      to { top: 100vh; }
    }
  </style>
</head>
<body>

<div class="scanline"></div>

<!-- Loading screen -->
<div id="loading">
  <img src="TBDFC_Logo_Official.png" class="loading-crest" alt="TBD FC" />
  <div class="loading-text">Loading Squad Data...</div>
</div>

<!-- Header -->
<header>
  <div class="logo">
    <img src="TBDFC_Logo_Official.png" alt="TBD FC" />
    <div class="logo-text">
      <div class="logo-name">TBD FC</div>
      <div class="logo-sub">Internationals · Madison, WI</div>
    </div>
  </div>
  <div class="header-right">
    <div class="header-stat">
      <div class="header-stat-num" id="stat-players">0</div>
      <div class="header-stat-label">Players</div>
    </div>
    <div class="header-divider"></div>
    <div class="header-stat">
      <div class="header-stat-num" id="stat-nations">0</div>
      <div class="header-stat-label">Nations</div>
    </div>
    <div class="header-divider"></div>
    <div class="header-stat">
      <div class="header-stat-num" id="stat-subscribers">0</div>
      <div class="header-stat-label">Following</div>
    </div>
  </div>
</header>

<!-- Map -->
<div id="map-wrap">
  <svg id="world-map"></svg>
</div>

<!-- Tooltip -->
<div id="tooltip">
  <div class="tooltip-country" id="tt-country"></div>
  <div class="tooltip-stats" id="tt-stats"></div>
</div>

<!-- Side Panel -->
<div id="side-panel">
  <div class="panel-header">
    <button class="panel-close" id="panel-close">✕</button>
    <div class="panel-flag" id="panel-flag"></div>
    <div class="panel-country-name" id="panel-country"></div>
    <div class="panel-counts">
      <div class="panel-count">
        <div class="panel-count-num" id="panel-player-count">0</div>
        <div class="panel-count-label">Players</div>
      </div>
      <div class="panel-divider"></div>
      <div class="panel-count">
        <div class="panel-count-num" id="panel-sub-count">0</div>
        <div class="panel-count-label">Followers</div>
      </div>
    </div>
  </div>
  <div class="panel-body" id="panel-body"></div>
</div>

<script>
// ── Config — replace with your actual Supabase credentials ──
const SUPABASE_URL = 'https://gupjbdloocwyjnqdgxxz.supabase.co'
const SUPABASE_ANON_KEY = 'sb_publishable_S_WIbOVEevGNH55---iEeQ_boZweYwL'

const { createClient } = supabase
const db = createClient(https://gupjbdloocwyjnqdgxxz.supabase.co, sb_publishable_S_WIbOVEevGNH55---iEeQ_boZweYwL)

// ── State ──
let playersByCountry = {}  // { 'CD': [...players] }
let subscribersByCountry = {} // { 'CD': 17 }
let activeCountries = new Set()
let geoData = null

// ── Country name → ISO2 code mapping (for D3 geo names) ──
const NAME_TO_ISO = {
  'Afghanistan':'AF','Albania':'AL','Algeria':'DZ','Angola':'AO','Argentina':'AR',
  'Armenia':'AM','Australia':'AU','Austria':'AT','Azerbaijan':'AZ','Bahrain':'BH',
  'Bangladesh':'BD','Belarus':'BY','Belgium':'BE','Benin':'BJ','Bolivia':'BO',
  'Bosnia and Herz.':'BA','Botswana':'BW','Brazil':'BR','Bulgaria':'BG',
  'Burkina Faso':'BF','Burundi':'BI','Cambodia':'KH','Cameroon':'CM','Canada':'CA',
  'Central African Rep.':'CF','Chad':'TD','Chile':'CL','China':'CN','Colombia':'CO',
  'Congo':'CG','Dem. Rep. Congo':'CD','Costa Rica':'CR','Croatia':'HR','Cuba':'CU',
  'Cyprus':'CY','Czech Rep.':'CZ','Denmark':'DK','Djibouti':'DJ',
  'Dominican Rep.':'DO','Ecuador':'EC','Egypt':'EG','El Salvador':'SV',
  'Equatorial Guinea':'GQ','Eritrea':'ER','Estonia':'EE','Eswatini':'SZ',
  'Ethiopia':'ET','Fiji':'FJ','Finland':'FI','France':'FR','Gabon':'GA',
  'Gambia':'GM','Georgia':'GE','Germany':'DE','Ghana':'GH','Greece':'GR',
  'Guatemala':'GT','Guinea':'GN','Guinea-Bissau':'GW','Guyana':'GY','Haiti':'HT',
  'Honduras':'HN','Hungary':'HU','Iceland':'IS','India':'IN','Indonesia':'ID',
  'Iran':'IR','Iraq':'IQ','Ireland':'IE','Israel':'IL','Italy':'IT',
  "Côte d'Ivoire":'CI','Jamaica':'JM','Japan':'JP','Jordan':'JO',
  'Kazakhstan':'KZ','Kenya':'KE','Kuwait':'KW','Kyrgyzstan':'KG','Laos':'LA',
  'Latvia':'LV','Lebanon':'LB','Lesotho':'LS','Liberia':'LR','Libya':'LY',
  'Lithuania':'LT','Luxembourg':'LU','Madagascar':'MG','Malawi':'MW',
  'Malaysia':'MY','Mali':'ML','Malta':'MT','Mauritania':'MR','Mexico':'MX',
  'Moldova':'MD','Mongolia':'MN','Montenegro':'ME','Morocco':'MA',
  'Mozambique':'MZ','Myanmar':'MM','Namibia':'NA','Nepal':'NP','Netherlands':'NL',
  'New Zealand':'NZ','Nicaragua':'NI','Niger':'NE','Nigeria':'NG',
  'North Korea':'KP','North Macedonia':'MK','Norway':'NO','Oman':'OM',
  'Pakistan':'PK','Palestine':'PS','Panama':'PA','Paraguay':'PY','Peru':'PE',
  'Philippines':'PH','Poland':'PL','Portugal':'PT','Qatar':'QA','Romania':'RO',
  'Russia':'RU','Rwanda':'RW','Saudi Arabia':'SA','Senegal':'SN','Serbia':'RS',
  'Sierra Leone':'SL','Slovakia':'SK','Slovenia':'SI','Somalia':'SO',
  'South Africa':'ZA','South Korea':'KR','South Sudan':'SS','Spain':'ES',
  'Sri Lanka':'LK','Sudan':'SD','Suriname':'SR','Sweden':'SE','Switzerland':'CH',
  'Syria':'SY','Tajikistan':'TJ','Tanzania':'TZ','Thailand':'TH','Togo':'TG',
  'Trinidad and Tobago':'TT','Tunisia':'TN','Turkey':'TR','Turkmenistan':'TM',
  'Uganda':'UG','Ukraine':'UA','United Arab Emirates':'AE','United Kingdom':'GB',
  'United States of America':'US','Uruguay':'UY','Uzbekistan':'UZ',
  'Venezuela':'VE','Vietnam':'VN','Yemen':'YE','Zambia':'ZM','Zimbabwe':'ZW',
  'Greenland':'GL','Antarctica':'AQ',
}

const ISO_TO_NAME = Object.fromEntries(Object.entries(NAME_TO_ISO).map(([k,v]) => [v,k]))

function getFlag(code) {
  if (!code || code.length !== 2) return ''
  return code.toUpperCase().replace(/./g, c => String.fromCodePoint(c.charCodeAt(0) + 127397))
}

// ── Load data ──
async function loadData() {
  const { data: players } = await db
    .from('profiles')
    .select('id, full_name, position, nationality, nationality_code, avatar_url, bio, highlight_url, is_public')
    .eq('is_active', true)
    .eq('role', 'player')
    .eq('is_public', true)

  if (players) {
    for (const p of players) {
      const code = p.nationality_code?.toUpperCase()
      if (!code) continue
      if (!playersByCountry[code]) playersByCountry[code] = []
      playersByCountry[code].push(p)
      activeCountries.add(code)
    }
    document.getElementById('stat-players').textContent = players.length
    document.getElementById('stat-nations').textContent = activeCountries.size
  }

  // Subscribers placeholder — all 0 for now
  document.getElementById('stat-subscribers').textContent = 0
}

// ── Build map ──
async function buildMap() {
  const resp = await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
  const world = await resp.json()
  const { feature } = await import('https://cdn.jsdelivr.net/npm/topojson-client@3/+esm')
  geoData = feature(world, world.objects.countries)

  const svg = d3.select('#world-map')
  const w = window.innerWidth
  const h = window.innerHeight

  svg.attr('viewBox', `0 0 ${w} ${h}`)

  const projection = d3.geoNaturalEarth1()
    .scale(w / 6.2)
    .translate([w / 2, h / 2])

  const path = d3.geoPath().projection(projection)

  // We need country names from the numeric IDs
  const codeResp = await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
  // Use a simple name lookup via a countries dataset
  const namesResp = await fetch('https://raw.githubusercontent.com/lukes/ISO-3166-Countries-with-Regional-Codes/master/slim-3/slim-3.json')
  let numToAlpha2 = {}
  if (namesResp.ok) {
    const names = await namesResp.json()
    for (const c of names) {
      numToAlpha2[c['country-code']] = c['alpha-2']
    }
  }

  const tooltip = document.getElementById('tooltip')
  const mapWrap = document.getElementById('map-wrap')

  svg.selectAll('.country')
    .data(geoData.features)
    .join('path')
    .attr('class', d => {
      const alpha2 = numToAlpha2[d.id] || ''
      return `country ${activeCountries.has(alpha2) ? 'active' : 'inactive'}`
    })
    .attr('d', path)
    .on('mousemove', function(event, d) {
      const alpha2 = numToAlpha2[d.id] || ''
      if (!activeCountries.has(alpha2)) return

      const players = playersByCountry[alpha2] || []
      const subs = subscribersByCountry[alpha2] || 0
      const countryName = players[0]?.nationality || alpha2

      document.getElementById('tt-country').textContent = countryName
      document.getElementById('tt-stats').innerHTML =
        `<span>${players.length}</span> player${players.length !== 1 ? 's' : ''} · <span>${subs}</span> followers`

      tooltip.classList.add('visible')
      tooltip.style.left = (event.clientX + 14) + 'px'
      tooltip.style.top = (event.clientY - 40) + 'px'
    })
    .on('mouseleave', function(event, d) {
      const alpha2 = numToAlpha2[d.id] || ''
      if (!activeCountries.has(alpha2)) return
      tooltip.classList.remove('visible')
    })
    .on('click', function(event, d) {
      const alpha2 = numToAlpha2[d.id] || ''
      if (!activeCountries.has(alpha2)) return
      tooltip.classList.remove('visible')
      openPanel(alpha2)
    })

  // Resize
  window.addEventListener('resize', () => {
    const nw = window.innerWidth
    const nh = window.innerHeight
    svg.attr('viewBox', `0 0 ${nw} ${nh}`)
    projection.scale(nw / 6.2).translate([nw / 2, nh / 2])
    svg.selectAll('.country').attr('d', path)
  })
}

// ── Side panel ──
function openPanel(countryCode) {
  const players = playersByCountry[countryCode] || []
  const subs = subscribersByCountry[countryCode] || 0
  const countryName = players[0]?.nationality || countryCode
  const flag = getFlag(countryCode)

  document.getElementById('panel-flag').textContent = flag
  document.getElementById('panel-country').textContent = countryName
  document.getElementById('panel-player-count').textContent = players.length
  document.getElementById('panel-sub-count').textContent = subs

  const body = document.getElementById('panel-body')
  body.innerHTML = ''

  if (players.length > 0) {
    const title = document.createElement('div')
    title.className = 'panel-section-title'
    title.textContent = 'Players'
    body.appendChild(title)

    for (const p of players) {
      const card = document.createElement('div')
      card.className = 'player-card'

      const avatar = document.createElement('div')
      avatar.className = 'player-avatar'
      if (p.avatar_url) {
        const img = document.createElement('img')
        img.src = p.avatar_url
        img.alt = p.full_name
        avatar.appendChild(img)
      } else {
        const init = document.createElement('div')
        init.className = 'player-initial'
        init.textContent = p.full_name.charAt(0)
        avatar.appendChild(init)
      }

      const info = document.createElement('div')
      info.className = 'player-info'

      const name = document.createElement('div')
      name.className = 'player-name'
      name.textContent = p.full_name

      const pos = document.createElement('div')
      pos.className = 'player-position'
      pos.textContent = `${flag} ${p.position || 'Player'}`

      info.appendChild(name)
      info.appendChild(pos)

      if (p.bio) {
        const bio = document.createElement('div')
        bio.className = 'player-bio'
        bio.textContent = `"${p.bio}"`
        info.appendChild(bio)
      }

      if (p.highlight_url) {
        const hl = document.createElement('a')
        hl.href = p.highlight_url
        hl.target = '_blank'
        hl.rel = 'noreferrer'
        hl.className = 'player-highlight'
        hl.innerHTML = '🎬 Highlights'
        info.appendChild(hl)
      }

      card.appendChild(avatar)
      card.appendChild(info)
      body.appendChild(card)
    }
  }

  // Subscribers section
  const subTitle = document.createElement('div')
  subTitle.className = 'panel-section-title'
  subTitle.style.marginTop = players.length ? '20px' : '0'
  subTitle.textContent = 'Community'
  body.appendChild(subTitle)

  const subRow = document.createElement('div')
  subRow.className = 'subscribers-row'
  subRow.innerHTML = `
    <div class="sub-icon">🌍</div>
    <div class="sub-text">
      <div class="sub-count">${subs}</div>
      <div class="sub-label">Newsletter followers from ${countryName}</div>
    </div>
  `
  body.appendChild(subRow)

  document.getElementById('side-panel').classList.add('open')
  document.getElementById('map-wrap').classList.add('panel-open')
}

function closePanel() {
  document.getElementById('side-panel').classList.remove('open')
  document.getElementById('map-wrap').classList.remove('panel-open')
}

document.getElementById('panel-close').addEventListener('click', closePanel)

// ── Init ──
async function init() {
  await loadData()
  await buildMap()
  document.getElementById('loading').classList.add('hidden')
}

init()
</script>
</body>
</html>
